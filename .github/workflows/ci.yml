name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test ( ${{ matrix.os }} ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
          - macos-15-intel
        rust:
          - 1.86.0
          - 1.87.0
          - 1.88.0
          - 1.89.0
          - 1.90.0
          - 1.91.0
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: remove Cargo.lock
        shell: bash
        run: rm -f Cargo.lock

      - name: Run tests
        run: cargo test --workspace --all-targets
